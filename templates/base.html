<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERCRIME Research — India 2014–2025</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f1117;
            color: #c9d1d9;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            background-color: #161b22 !important;
            border-bottom: 1px solid #30363d;
            padding: 0.8rem 0;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: #58a6ff !important;
            background: linear-gradient(90deg, #58a6ff 0%, #bc8cff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-link {
            color: #8b949e !important;
            font-weight: 500;
            margin-left: 1rem;
            transition: color 0.2s ease-in-out;
        }
        .nav-link:hover, .nav-link.active {
            color: #58a6ff !important;
        }
        .main-content {
            flex: 1;
            padding: 2.5rem 0;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            color: #c9d1d9;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        .card-header {
            background-color: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid #30363d;
            font-weight: 600;
        }
        .btn-gradient {
            background: linear-gradient(90deg, #58a6ff 0%, #bc8cff 100%);
            border: none;
            color: white;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn-gradient:hover {
            opacity: 0.9;
            color: white;
        }
        footer {
            background-color: #161b22;
            border-top: 1px solid #30363d;
            padding: 1.2rem 0;
            color: #8b949e;
            font-size: 0.85rem;
            text-align: center;
            margin-top: auto;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/submit"> CYBERCRIME Research — India 2014–2025</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/submit' or request.path == '/' %}active{% endif %}" href="/submit">Submit Experience</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/gioia' %}active{% endif %}" href="/gioia">Gioia Analysis</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container main-content">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <div class="container">
            © 2026 Academic Cybercrime Research Initiative — India (2014–2025)
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
